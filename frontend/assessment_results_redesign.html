<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Results | Sovereign Compliance</title>
    <style>
        /* ============================================
           CSS VARIABLES
           ============================================ */
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-card: #1e293b;

            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;

            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: rgba(79, 70, 229, 0.15);

            --critical: #ef4444;
            --critical-bg: rgba(239, 68, 68, 0.12);
            --critical-border: rgba(239, 68, 68, 0.3);

            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.12);
            --success-border: rgba(34, 197, 94, 0.3);

            --major: #f97316;
            --blue: #3b82f6;

            --border: #334155;
            --radius: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            padding: 32px 48px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        /* ============================================
           VIEWS
           ============================================ */
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============================================
           HEADER TILES
           ============================================ */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
        }

        .metric-card.center {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .risk-gauge {
            width: 48px;
            height: 48px;
            margin-bottom: 6px;
            border-radius: 50%;
            border: 3px solid var(--critical);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--critical-bg);
        }

        .risk-gauge .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--critical);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.2;
        }

        .metric-value.critical { color: var(--critical); }
        .metric-value.blue { color: var(--blue); }
        .metric-value.green { color: var(--success); }

        .metric-sublabel {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .metric-sublabel.critical { color: var(--critical); }

        /* ============================================
           TABS
           ============================================ */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ============================================
           VIOLATION CARDS
           ============================================ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .violation-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .violation-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--critical);
            border-radius: var(--radius) 0 0 var(--radius);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .violation-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .violation-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-article {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-top: 4px;
            color: var(--text-primary);
        }

        .badge {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.critical {
            background: var(--critical-bg);
            color: var(--critical);
        }

        .card-description {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .card-meta {
            color: var(--text-muted);
        }

        .card-arrow {
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
        }

        /* ============================================
           DETAIL VIEW
           ============================================ */
        .detail-view {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-bottom: 32px;
        }

        .back-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* Detail Header */
        .detail-header {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .detail-accent {
            width: 4px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .detail-header-content {
            flex: 1;
        }

        .detail-article {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .detail-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 700px;
        }

        .detail-badges {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .severity-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--critical-bg);
            border-radius: var(--radius);
            font-size: 12px;
            font-weight: 600;
            color: var(--critical);
        }

        .confidence-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .confidence-bar {
            width: 50px;
            height: 4px;
            background: var(--bg-primary);
            border-radius: 2px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }

        /* ============================================
           COMPLIANCE JOURNEY
           ============================================ */
        .journey-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .journey-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 24px;
            align-items: stretch;
        }

        .journey-state {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 24px;
            position: relative;
            border: 1px solid var(--border);
        }

        .journey-state.current {
            border-color: var(--critical-border);
        }

        .journey-state.compliant {
            border-color: var(--success-border);
        }

        .journey-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 24px;
        }

        .journey-icon.current {
            background: var(--critical-bg);
            color: var(--critical);
        }

        .journey-icon.compliant {
            background: var(--success-bg);
            color: var(--success);
        }

        .journey-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .journey-label.current {
            color: var(--critical);
        }

        .journey-label.compliant {
            color: var(--success);
        }

        .journey-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .journey-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .journey-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 32px;
            font-weight: 300;
        }

        .journey-arrow svg {
            width: 48px;
            height: 48px;
            animation: pulseArrow 2s ease-in-out infinite;
        }

        @keyframes pulseArrow {
            0%, 100% { transform: translateX(0); opacity: 0.7; }
            50% { transform: translateX(8px); opacity: 1; }
        }

        /* ============================================
           REMEDIATION STEPS
           ============================================ */
        .steps-section {
            margin-bottom: 40px;
        }

        .steps-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .step-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .step-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .step-progress {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 80px;
        }

        /* ============================================
           RISK REDUCTION
           ============================================ */
        .risk-section {
            margin-bottom: 40px;
        }

        .risk-card {
            background: var(--accent-light);
            border: 1px solid var(--accent);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .risk-content {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .risk-icon {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .risk-icon svg {
            width: 32px;
            height: 32px;
        }

        .risk-text h3 {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .risk-text p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .risk-value {
            text-align: right;
        }

        .risk-number {
            font-size: 56px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .risk-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        .detail-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .nav-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        .nav-hint {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-hint kbd {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1200px) {
            .cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 900px) {
            .container {
                padding: 24px;
            }
            .metrics-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .journey-container {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .journey-arrow {
                transform: rotate(90deg);
            }
            .risk-card {
                flex-direction: column;
                text-align: center;
                gap: 24px;
            }
            .risk-content {
                flex-direction: column;
            }
            .risk-value {
                text-align: center;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 16px;
            }
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .detail-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ============================================
             GRID VIEW
             ============================================ -->
        <div class="view active" id="gridView">
            <h1 class="page-title">Assessment Results</h1>

            <!-- 5 Compact Tiles -->
            <div class="metrics-grid">
                <div class="metric-card center">
                    <div class="risk-gauge">
                        <span class="value">70</span>
                    </div>
                    <p class="metric-label">Risk Score</p>
                </div>
                <div class="metric-card">
                    <p class="metric-label">Violations</p>
                    <p class="metric-value critical">3</p>
                    <p class="metric-sublabel critical">Critical issues</p>
                </div>
                <div class="metric-card">
                    <p class="metric-label">Risk Level</p>
                    <p class="metric-value critical">HIGH</p>
                    <p class="metric-sublabel">Immediate action</p>
                </div>
                <div class="metric-card">
                    <p class="metric-label">Timeline</p>
                    <p class="metric-value blue">3 mo</p>
                    <p class="metric-sublabel">To remediate</p>
                </div>
                <div class="metric-card">
                    <p class="metric-label">Coverage</p>
                    <p class="metric-value green">87%</p>
                    <p class="metric-sublabel">Eval scope</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="violations">Technical Fix Plan</button>
                <button class="tab-btn" data-tab="business">Business Plan</button>
                <button class="tab-btn" data-tab="citations">Citations</button>
            </div>

            <!-- Tab Content -->
            <div class="tab-content active" id="violations">
                <div class="cards-grid" id="violationsGrid"></div>
            </div>
            <div class="tab-content" id="business">
                <div class="cards-grid" id="businessGrid"></div>
            </div>
            <div class="tab-content" id="citations">
                <div class="cards-grid" id="citationsGrid"></div>
            </div>
        </div>

        <!-- ============================================
             DETAIL VIEW
             ============================================ -->
        <div class="view" id="detailView">
            <div class="detail-view">
                <!-- Back Button -->
                <button class="back-btn" id="backToGrid">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Violations
                </button>

                <!-- Detail Content -->
                <div id="detailContent"></div>

                <!-- Navigation -->
                <div class="detail-nav">
                    <button class="nav-btn" id="prevBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Previous
                    </button>
                    <div class="nav-hint">
                        <kbd>←</kbd> <kbd>→</kbd> to navigate • <kbd>ESC</kbd> to go back
                    </div>
                    <button class="nav-btn" id="nextBtn">
                        Next
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATA
        // ============================================
        const violations = [
            {
                article: 'Article 22',
                title: 'Automated Decision-Making',
                severity: 'CRITICAL',
                confidence: 92,
                description: 'System makes final hiring decisions without human review, violating GDPR requirements for human oversight.',
                currentState: {
                    title: 'No Human Review',
                    desc: 'AI makes final hiring decisions autonomously without any human oversight or appeal mechanism.'
                },
                compliantState: {
                    title: 'Human-in-Loop Process',
                    desc: 'All AI decisions reviewed by qualified HR staff before finalization. Appeal process available.'
                },
                riskReduction: 35,
                steps: [
                    { title: 'Implement Review Queue', desc: 'Add mandatory human review step before decisions', progress: 0 },
                    { title: 'Build Appeal Portal', desc: 'Create candidate-facing appeal mechanism', progress: 0 },
                    { title: 'Update Privacy Policy', desc: 'Add automated decision-making disclosures', progress: 0 },
                    { title: 'Train HR Team', desc: 'Educate team on GDPR Article 22 requirements', progress: 0 }
                ]
            },
            {
                article: 'Article 17',
                title: 'Right to Erasure',
                severity: 'CRITICAL',
                confidence: 92,
                description: 'No automated data deletion process exists, making it impossible to fulfill erasure requests within 30 days.',
                currentState: {
                    title: 'Manual Deletion Only',
                    desc: 'Data deletion requires manual database queries. No tracking of requests or deadlines.'
                },
                compliantState: {
                    title: 'Automated Erasure Pipeline',
                    desc: 'One-click deletion across all systems with audit trail and automatic deadline tracking.'
                },
                riskReduction: 30,
                steps: [
                    { title: 'Audit Data Locations', desc: 'Map all systems storing personal data', progress: 0 },
                    { title: 'Build Deletion API', desc: 'Create automated deletion endpoints', progress: 0 },
                    { title: 'Cascade Deletion', desc: 'Ensure related records deleted together', progress: 0 },
                    { title: 'Request Tracking', desc: 'Build compliance deadline dashboard', progress: 0 }
                ]
            },
            {
                article: 'Article 32',
                title: 'Security of Processing',
                severity: 'CRITICAL',
                confidence: 85,
                description: 'Resume data stored without encryption at rest, exposing organization to data breach risks.',
                currentState: {
                    title: 'Unencrypted Storage',
                    desc: 'Sensitive PII stored in plaintext. No encryption at rest or key management.'
                },
                compliantState: {
                    title: 'AES-256 Encryption',
                    desc: 'All data encrypted at rest with AES-256. 90-day key rotation with secure management.'
                },
                riskReduction: 25,
                steps: [
                    { title: 'Enable DB Encryption', desc: 'Implement AES-256 encryption at rest', progress: 0 },
                    { title: 'Configure TLS 1.3', desc: 'Encrypt all data in transit', progress: 0 },
                    { title: 'Key Rotation', desc: 'Set up 90-day key rotation policy', progress: 0 },
                    { title: 'Security Monitoring', desc: 'Deploy encryption status dashboard', progress: 0 }
                ]
            }
        ];

        const businessActions = [
            { title: 'Update Privacy Policy', category: 'Legal', desc: 'Revise disclosures for automated decisions' },
            { title: 'Human Review System', category: 'Engineering', desc: 'Deploy manual review queue' },
            { title: 'Deletion Pipeline', category: 'Engineering', desc: 'Create automated erasure workflow' },
            { title: 'Database Encryption', category: 'DevOps', desc: 'Implement AES-256 encryption' }
        ];

        const citations = [
            { article: 'Article 22', title: 'Automated Decisions', relevance: 95 },
            { article: 'Article 17', title: 'Right to Erasure', relevance: 92 },
            { article: 'Article 32', title: 'Security', relevance: 88 }
        ];

        let currentIndex = 0;

        // ============================================
        // RENDER FUNCTIONS
        // ============================================
        function renderViolationCards() {
            document.getElementById('violationsGrid').innerHTML = violations.map((v, i) => `
                <div class="violation-card" data-type="violation" data-index="${i}">
                    <div class="card-header">
                        <div>
                            <p class="card-article">${v.article}</p>
                            <h3 class="card-title">${v.title}</h3>
                        </div>
                        <span class="badge critical">${v.severity}</span>
                    </div>
                    <p class="card-description">${v.description}</p>
                    <div class="card-footer">
                        <span class="card-meta">P0 • ${v.confidence}%</span>
                        <span class="card-arrow">→</span>
                    </div>
                </div>
            `).join('');
        }

        function renderBusinessCards() {
            document.getElementById('businessGrid').innerHTML = businessActions.map((b, i) => `
                <div class="violation-card">
                    <p class="card-article">${b.category}</p>
                    <h3 class="card-title">${b.title}</h3>
                    <p class="card-description">${b.desc}</p>
                    <div class="card-footer">
                        <span class="card-meta">Week ${i + 1}</span>
                        <span class="card-arrow">→</span>
                    </div>
                </div>
            `).join('');
        }

        function renderCitationCards() {
            document.getElementById('citationsGrid').innerHTML = citations.map(c => `
                <div class="violation-card">
                    <div class="card-header">
                        <div>
                            <p class="card-article">GDPR</p>
                            <h3 class="card-title">${c.article} - ${c.title}</h3>
                        </div>
                        <span class="badge" style="background: var(--accent-light); color: var(--accent)">${c.relevance}%</span>
                    </div>
                    <p class="card-description">Regulatory reference for compliance assessment</p>
                    <div class="card-footer">
                        <span class="card-meta">GDPR Reference</span>
                        <span class="card-arrow">→</span>
                    </div>
                </div>
            `).join('');
        }

        function renderDetailView(index) {
            const v = violations[index];
            document.getElementById('detailContent').innerHTML = `
                <!-- Header -->
                <div class="detail-header">
                    <div class="detail-accent"></div>
                    <div class="detail-header-content">
                        <p class="detail-article">${v.article}</p>
                        <h1 class="detail-title">${v.title}</h1>
                        <p class="detail-description">${v.description}</p>
                        <div class="detail-badges">
                            <div class="severity-badge">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                    <line x1="12" y1="9" x2="12" y2="13"/>
                                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                                </svg>
                                ${v.severity}
                            </div>
                            <div class="confidence-badge">
                                Confidence
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${v.confidence}%"></div>
                                </div>
                                ${v.confidence}%
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Compliance Journey -->
                <div class="journey-section">
                    <h2 class="section-title">Compliance Journey</h2>
                    <div class="journey-container">
                        <div class="journey-state current">
                            <div class="journey-icon current">⚠️</div>
                            <p class="journey-label current">Current State</p>
                            <h3 class="journey-title">${v.currentState.title}</h3>
                            <p class="journey-desc">${v.currentState.desc}</p>
                        </div>
                        <div class="journey-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </div>
                        <div class="journey-state compliant">
                            <div class="journey-icon compliant">✓</div>
                            <p class="journey-label compliant">Compliant State</p>
                            <h3 class="journey-title">${v.compliantState.title}</h3>
                            <p class="journey-desc">${v.compliantState.desc}</p>
                        </div>
                    </div>
                </div>

                <!-- Remediation Steps -->
                <div class="steps-section">
                    <h2 class="section-title">Remediation Steps</h2>
                    <div class="steps-grid">
                        ${v.steps.map((step, i) => `
                            <div class="step-card">
                                <div class="step-number">${i + 1}</div>
                                <div class="step-content">
                                    <h4 class="step-title">${step.title}</h4>
                                    <p class="step-desc">${step.desc}</p>
                                    <div class="step-progress">
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width: ${step.progress}%"></div>
                                        </div>
                                        <span class="progress-label">${step.progress}% complete</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Risk Reduction -->
                <div class="risk-section">
                    <h2 class="section-title">Impact</h2>
                    <div class="risk-card">
                        <div class="risk-content">
                            <div class="risk-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 12 14.01 9 11.01"/>
                                </svg>
                            </div>
                            <div class="risk-text">
                                <h3>Risk Reduction Potential</h3>
                                <p>Completing this remediation will significantly reduce your compliance risk exposure.</p>
                            </div>
                        </div>
                        <div class="risk-value">
                            <div class="risk-number">${v.riskReduction}%</div>
                            <div class="risk-label">Risk Eliminated</div>
                        </div>
                    </div>
                </div>
            `;

            // Update nav buttons
            document.getElementById('prevBtn').classList.toggle('disabled', index === 0);
            document.getElementById('nextBtn').classList.toggle('disabled', index === violations.length - 1);
        }

        // ============================================
        // VIEW SWITCHING
        // ============================================
        function showGridView() {
            document.getElementById('gridView').classList.add('active');
            document.getElementById('detailView').classList.remove('active');
        }

        function showDetailView(index) {
            currentIndex = index;
            document.getElementById('gridView').classList.remove('active');
            document.getElementById('detailView').classList.add('active');
            renderDetailView(index);
            window.scrollTo(0, 0);
        }

        function navigatePrev() {
            if (currentIndex > 0) {
                currentIndex--;
                renderDetailView(currentIndex);
                window.scrollTo(0, 0);
            }
        }

        function navigateNext() {
            if (currentIndex < violations.length - 1) {
                currentIndex++;
                renderDetailView(currentIndex);
                window.scrollTo(0, 0);
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            renderViolationCards();
            renderBusinessCards();
            renderCitationCards();

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });

            // Card clicks
            document.addEventListener('click', (e) => {
                const card = e.target.closest('.violation-card');
                if (card && card.dataset.type === 'violation') {
                    showDetailView(parseInt(card.dataset.index));
                }
            });

            // Navigation
            document.getElementById('backToGrid').addEventListener('click', showGridView);
            document.getElementById('prevBtn').addEventListener('click', navigatePrev);
            document.getElementById('nextBtn').addEventListener('click', navigateNext);

            // Keyboard
            document.addEventListener('keydown', (e) => {
                if (!document.getElementById('detailView').classList.contains('active')) return;
                if (e.key === 'ArrowLeft') navigatePrev();
                if (e.key === 'ArrowRight') navigateNext();
                if (e.key === 'Escape') showGridView();
            });
        });
    </script>
</body>
</html>
