services:
  - type: web
    name: sovereign-v5
    env: python
    region: oregon
    plan: free
    buildCommand: "pip cache purge && pip install --no-cache-dir --upgrade -r backend/requirements.txt"
    startCommand: "unset HTTP_PROXY HTTPS_PROXY http_proxy https_proxy && uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
